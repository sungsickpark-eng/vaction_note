version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: travel_diary_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: travel_root
      MYSQL_DATABASE: travel_diary
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: travel_diary_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
